services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ssl_monitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssl_monitor}
      POSTGRES_DB: ssl_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssl_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ssl_monitor:${POSTGRES_PASSWORD:-ssl_monitor}@db:5432/ssl_monitor
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres_data:
